<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Graph-based Audio Equalizer</title>
    <link rel="stylesheet" href="./popup.css" />
</head>
<body>
    <div class="container">
        <header>
            <h1>Graph-based Audio Equalizer</h1>
        </header>

        <!-- 그래프 영역 -->
        <div class="graph-section">
            <div class="graph-instructions">
                <span>📌 더블클릭으로 새 노드 생성 | 좌클릭으로 정보 확인 | 우클릭으로 노드 제거</span>
            </div>
            <canvas id="eqGraph" width="800" height="250"></canvas>
        </div>

        <!-- 마스터 게인 -->
        <div class="master-control">
            <label>마스터 게인</label>
            <input type="range" id="masterGain" min="-12" max="12" value="0" step="0.1" />
            <span id="masterGainValue">0.0 dB</span>
        </div>

        <!-- 오디오 캡처 제어 -->
        <div class="capture-control">
            <button id="captureButton" class="btn btn-primary">🎤 오디오 캡처 시작</button>
            <span id="captureStatus" class="status-indicator">대기 중</span>
        </div>

        <!-- 노드 제어 패널 -->
        <div class="controls-grid">
            <!-- 좌측: 노드 리스트 -->
            <div class="node-list-section">
                <h3>노드 목록</h3>
                <div id="nodeList" class="node-list"></div>
            </div>

            <!-- 우측: 파라미터 입력 -->
            <div class="parameter-section">
                <div id="controlPanel" class="control-panel">
                    <p>노드를 선택하세요</p>
                </div>
            </div>
        </div>

        <!-- 삭제 버튼 (현재 선택된 필터 제거) -->
        <div class="actions">
            <button id="deleteButton" class="btn btn-danger">선택된 필터 삭제</button>
        </div>
    </div>

    <script type="module" src="./popup.ts"></script>
</body>
</html>
