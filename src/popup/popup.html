<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pro-Q Equalizer</title>
    <link rel="stylesheet" href="./popup.css" />
</head>
<body>
    <div class="container">
        <header>
            <h1>Pro-Q Equalizer</h1>
            <p class="subtitle">파라메트릭 이퀄라이저</p>
        </header>

        <div class="visualizer-container">
            <canvas id="frequencyCanvas" width="100%" height="200"></canvas>
        </div>

        <div class="controls">
            <div class="control-section">
                <label for="masterGain">마스터 게인</label>
                <input type="range" id="masterGain" min="-12" max="12" value="0" step="0.1" />
                <span id="gainValue">0 dB</span>
            </div>

            <div class="filter-controls">
                <div class="filter-group" id="filterGroup">
                    <!-- 필터 컨트롤이 JavaScript로 동적 생성됨 -->
                </div>
            </div>

            <button id="captureButton" class="btn btn-primary">오디오 캡처 시작</button>
            <button id="resetButton" class="btn btn-secondary">초기화</button>
        </div>
    </div>

    <script type="module" src="./popup.ts"></script>
</body>
</html>
